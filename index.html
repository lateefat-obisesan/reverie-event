    <body>
        <header>
            <img class="logo" id="header-logo" src="./assets/media/reverie-logo-header.png" alt="Reverie's logo">
            <div class="menu">
                <nav id="header-menu">
                    <a href="./">About Us</a>
                    <a href="./services.html">Our Services</a>

            </div>
            <div class="social-media">
